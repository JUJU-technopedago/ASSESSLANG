<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Skills Assessment</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        
        .container {
            display: flex;
            flex-direction: row;
            width: 100%;
            max-width: 2700px;   /* Increased from 2400px to accommodate shift */
            padding: 20px;
            gap: 0;          /* Remove gap, will handle spacing differently */
            height: 100vh;      /* Full viewport height */
        }
        
        .skills-panel {
            width: 450px;       /* Increased from 402.5px */
            flex-shrink: 0;
            padding: 20px;
            background-color: #f5f5f5;
            margin-right: 10px; /* Reduced from 160px */
            position: relative;  /* For absolute positioning of border */
            height: 100%;       /* Changed from calc */
            overflow-y: visible; /* Remove scrolling */
        }
        
        .graph-panel {
            flex: 1;
            min-width: 1000px;  /* Increased minimum width */
            height: 100%;       /* Changed from calc */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: visible;   /* Remove hidden overflow */
            margin-left: 85px;   /* Increased from 10px to move rightward */
            margin-right: 95px;  /* Adjusted from 170px to maintain overall width */
            aspect-ratio: 1;  /* Make it square */
        }
        
        .skill-group {
            margin-bottom: 15px; /* Reduced from 30px */
        }
        
        .skill-group label {
            font-weight: bold;
            color: #666;
        }
        
        select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        
        #svg-container {
            width: 100%;     /* Take full width of parent */
            height: 100%;    /* Take full height of parent */
            display: flex;   /* Enable flex layout */
            justify-content: center;
            align-items: center;
            transform: none; /* Remove fixed scale */
        }
        
        #svg-container svg {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            max-width: 100%;    /* Ensure SVG doesn't overflow */
            max-height: 100%;   /* Ensure SVG doesn't overflow */
        }
        
        .button-container {
            margin-top: 20px;
            text-align: center;
        }
        
        .download-btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        
        .download-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="skills-panel">
            <h2>Language Skills</h2>
            <div class="skill-group">
                <label>Compréhension Orale</label>
                <select id="skill1" onchange="updateGraph()">
                    <option value="">Select level</option>
                    <!-- First all "acquis" levels -->
                    <option>A1 acquis</option>
                    <option>A2 acquis</option>
                    <option>B1 acquis</option>
                    <option>B2 acquis</option>
                    <option>C1 acquis</option>
                    <option>C2 acquis</option>
                    <!-- Then all "en cours d'acquisition" levels -->
                    <option>A1 en cours d'acquisition</option>
                    <option>A2 en cours d'acquisition</option>
                    <option>B1 en cours d'acquisition</option>
                    <option>B2 en cours d'acquisition</option>
                    <option>C1 en cours d'acquisition</option>
                    <option>C2 en cours d'acquisition</option>
                </select>
            </div>
            <div class="skill-group">
                <label>Compréhension Écrite</label>
                <select id="skill2" onchange="updateGraph()">
                    <option value="">Select level</option>
                    <option>C2 acquis</option>
                    <option>C2 en cours d'acquisition</option>
                    <option>C1 acquis</option>
                    <option>C1 en cours d'acquisition</option>
                    <option>B2 acquis</option>
                    <option>B2 en cours d'acquisition</option>
                    <option>B1 acquis</option>
                    <option>B1 en cours d'acquisition</option>
                    <option>A2 acquis</option>
                    <option>A2 en cours d'acquisition</option>
                    <option>A1 acquis</option>
                    <option>A1 en cours d'acquisition</option>
                </select>
            </div>
            <div class="skill-group">
                <label>Production Écrite</label>
                <select id="skill3" onchange="updateGraph()">
                    <option value="">Select level</option>
                    <option>C2 acquis</option>
                    <option>C2 en cours d'acquisition</option>
                    <option>C1 acquis</option>
                    <option>C1 en cours d'acquisition</option>
                    <option>B2 acquis</option>
                    <option>B2 en cours d'acquisition</option>
                    <option>B1 acquis</option>
                    <option>B1 en cours d'acquisition</option>
                    <option>A2 acquis</option>
                    <option>A2 en cours d'acquisition</option>
                    <option>A1 acquis</option>
                    <option>A1 en cours d'acquisition</option>
                </select>
            </div>
            <div class="skill-group">
                <label>Production Orale</label>
                <select id="skill4" onchange="updateGraph()">
                    <option value="">Select level</option>
                    <option>C2 acquis</option>
                    <option>C2 en cours d'acquisition</option>
                    <option>C1 acquis</option>
                    <option>C1 en cours d'acquisition</option>
                    <option>B2 acquis</option>
                    <option>B2 en cours d'acquisition</option>
                    <option>B1 acquis</option>
                    <option>B1 en cours d'acquisition</option>
                    <option>A2 acquis</option>
                    <option>A2 en cours d'acquisition</option>
                    <option>A1 acquis</option>
                    <option>A1 en cours d'acquisition</option>
                </select>
            </div>
            <div class="skill-group">
                <label>Lexique</label>
                <select id="skill5" onchange="updateGraph()">
                    <option value="">Select level</option>
                    <option>C2 acquis</option>
                    <option>C2 en cours d'acquisition</option>
                    <option>C1 acquis</option>
                    <option>C1 en cours d'acquisition</option>
                    <option>B2 acquis</option>
                    <option>B2 en cours d'acquisition</option>
                    <option>B1 acquis</option>
                    <option>B1 en cours d'acquisition</option>
                    <option>A2 acquis</option>
                    <option>A2 en cours d'acquisition</option>
                    <option>A1 acquis</option>
                    <option>A1 en cours d'acquisition</option>
                </select>
            </div>
            <div class="skill-group">
                <label>Structure de la Langue</label>
                <select id="skill6" onchange="updateGraph()">
                    <option value="">Select level</option>
                    <option>C2 acquis</option>
                    <option>C2 en cours d'acquisition</option>
                    <option>C1 acquis</option>
                    <option>C1 en cours d'acquisition</option>
                    <option>B2 acquis</option>
                    <option>B2 en cours d'acquisition</option>
                    <option>B1 acquis</option>
                    <option>B1 en cours d'acquisition</option>
                    <option>A2 acquis</option>
                    <option>A2 en cours d'acquisition</option>
                    <option>A1 acquis</option>
                    <option>A1 en cours d'acquisition</option>
                </select>
            </div>
        </div>
        <div class="graph-panel">
            <div id="svg-container"></div>
        </div>
    </div>
    <script src="process_svg.js"></script>
    <script>
        async function loadSVG() {
            const response = await fetch('hexa.svg');
            let svgText = await response.text();
            
            // Modify the SVG to be fully responsive
            svgText = svgText.replace(/width="1000"/g, 'width="100%"')
                           .replace(/height="1000"/g, 'height="100%"')
                           .replace(/viewBox="0 0 1000 1000"/, 'viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet"');
            
            document.getElementById('svg-container').innerHTML = svgText;
        }

        function updateGraph() {
            const levels = {
                skill1: document.getElementById('skill1').value,
                skill2: document.getElementById('skill2').value,
                skill3: document.getElementById('skill3').value,
                skill4: document.getElementById('skill4').value,
                skill5: document.getElementById('skill5').value,
                skill6: document.getElementById('skill6').value
            };
            updateSVG(levels);
        }

        loadSVG().then(() => {
            // Clone options for all selects
            const options = document.querySelector('#skill1').innerHTML;
            ['skill2', 'skill3', 'skill4', 'skill5', 'skill6'].forEach(id => {
                document.getElementById(id).innerHTML = options;
            });
        });
    </script>
</body>
</html>
